<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Convertisseur de Tracés GTFS</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f9;
        }

        .etape {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 12px;
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <h2>Outil d'extraction des Tracés</h2>
    <div class="etape">
        <p><b>1. Charge le fichier "trips.txt" :</b></p>
        <input type="file" id="fileTrips" accept=".txt">
    </div>
    <div class="etape">
        <p><b>2. Charge le fichier "shapes.txt" :</b></p>
        <input type="file" id="fileShapes" accept=".txt">
    </div>
    <div class="etape">
        <button onclick="traiterFichiers()">3. Générer le code JavaScript</button>
    </div>
    <div class="etape">
        <p><b>4. Copie le résultat ci-dessous :</b><br></p>
        <textarea id="resultat"></textarea>
    </div>
    <script>
        async function traiterFichiers() {
            const fileTrips = document.getElementById('fileTrips').files[0];
            const fileShapes = document.getElementById('fileShapes').files[0];

            if (!fileTrips || !fileShapes) {
                alert("Erreur");
                return;
            }

            const ecranResultat = document.getElementById('resultat');
            ecranResultat.value = "Analyse en cours...";

            try {
                const textTrips = await fileTrips.text();
                const textShapes = await fileShapes.text();

                const lignesTrips = textTrips.split(/\r?\n/);

                const headersTrips = lignesTrips[0].split(',').map(h => h.trim());
                const idxRouteTrips = headersTrips.indexOf('route_id');
                const idxShapeTrips = headersTrips.indexOf('shape_id');
                const idxDirTrips = headersTrips.indexOf('direction_id');
                const idxHeadsign = headersTrips.indexOf('trip_headsign');

                const shapeToRoute = {};
                const seenCombos = new Set();

                for (let i = 1; i < lignesTrips.length; i++) {
                    if (lignesTrips[i].trim() === '') continue;

                    const cols = lignesTrips[i].split(',');
                    if (idxShapeTrips !== -1 && cols.length > idxShapeTrips && cols[idxShapeTrips]) {
                        const routeId = cols[idxRouteTrips].trim();
                        const shapeId = cols[idxShapeTrips].trim();

                        const dirId = idxDirTrips !== -1 ? cols[idxDirTrips].trim() : "0";
                        const headsign = idxHeadsign !== -1 ? cols[idxHeadsign].trim() : "X";

                        const comboKey = `${routeId}_${dirId}_${headsign}`;

                        if (!seenCombos.has(comboKey) && shapeId !== "") {
                            seenCombos.add(comboKey);
                            shapeToRoute[shapeId] = routeId;
                        }
                    }
                }

                const lignesShapes = textShapes.split(/\r?\n/);
                const shapesPoints = {};

                const headersShapes = lignesShapes[0].split(',').map(h => h.trim());
                const idxShapeShp = headersShapes.indexOf('shape_id');
                const idxLat = headersShapes.indexOf('shape_pt_lat');
                const idxLon = headersShapes.indexOf('shape_pt_lon');
                const idxSeq = headersShapes.indexOf('shape_pt_sequence');

                for (let i = 1; i < lignesShapes.length; i++) {
                    if (lignesShapes[i].trim() === '') continue;

                    const cols = lignesShapes[i].split(',');
                    if (idxShapeShp !== -1 && cols.length > Math.max(idxLat, idxLon, idxSeq) && cols[idxShapeShp]) {
                        const shapeId = cols[idxShapeShp].trim();

                        if (shapeToRoute[shapeId]) {
                            if (!shapesPoints[shapeId]) shapesPoints[shapeId] = [];

                            shapesPoints[shapeId].push({
                                seq: parseInt(cols[idxSeq]),
                                lat: parseFloat(cols[idxLat]),
                                lon: parseFloat(cols[idxLon])
                            });
                        }
                    }
                }

                const routeLines = {};
                for (const [shapeId, points] of Object.entries(shapesPoints)) {
                    const routeId = shapeToRoute[shapeId];
                    if (!routeLines[routeId]) routeLines[routeId] = [];

                    points.sort((a, b) => a.seq - b.seq);
                    const listeCoords = points.map(p => `[${p.lat}, ${p.lon}]`).join(', ');

                    routeLines[routeId].push(`[${listeCoords}]`);
                }

                let codeFinal = "const tracesLignes = {\n";
                for (const [routeId, lines] of Object.entries(routeLines)) {
                    codeFinal += `    "${routeId}": [\n        ${lines.join(',\n        ')}\n    ],\n`;
                }
                codeFinal += "};\n";

                ecranResultat.value = codeFinal;

            } catch (erreur) {
                ecranResultat.value = "Erreur : " + erreur.message;
            }
        }
    </script>
</body>

</html>
