<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Convertisseur Réseau (Ordre & Directions)</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f8fafc; color: #334155; }
        .etape { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 300px; font-family: monospace; font-size: 12px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 10px; box-sizing: border-box;}
        button { padding: 12px 24px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Outil d'extraction Expert (Sens de circulation et Y)</h2>
    <div class="etape"><p><b>1. "stops.txt"</b></p><input type="file" id="fileStops" accept=".txt"></div>
    <div class="etape"><p><b>2. "trips.txt"</b></p><input type="file" id="fileTrips" accept=".txt"></div>
    <div class="etape"><p><b>3. "stop_times.txt"</b></p><input type="file" id="fileStopTimes" accept=".txt"></div>
    <div class="etape"><button onclick="genererReseau()">Générer la carte mentale</button></div>
    <div class="etape"><textarea id="resultat">En attente...</textarea></div>

    <script>
        function lireCSV(ligne) {
            let res = [], val = '', inQuotes = false;
            for (let i = 0; i < ligne.length; i++) {
                if (ligne[i] === '"') inQuotes = !inQuotes;
                else if (ligne[i] === ',' && !inQuotes) { res.push(val.trim()); val = ''; }
                else val += ligne[i];
            }
            res.push(val.trim()); return res;
        }

        async function genererReseau() {
            const fStops = document.getElementById('fileStops').files[0];
            const fTrips = document.getElementById('fileTrips').files[0];
            const fStopTimes = document.getElementById('fileStopTimes').files[0];
            if (!fStops || !fTrips || !fStopTimes) return alert("Manque un fichier !");
            document.getElementById('resultat').value = "Calcul des séquences en cours (10 à 20 secondes)...";
            await new Promise(r => setTimeout(r, 100)); 

            try {
                // 1. Lire les trajets et définir leur empreinte unique
                const lignesTrips = (await fTrips.text()).split(/\r?\n/);
                const headTrips = lireCSV(lignesTrips[0]);
                const iRouteT = headTrips.indexOf('route_id'), iTripT = headTrips.indexOf('trip_id'), iHeadT = headTrips.indexOf('trip_headsign'), iShapeT = headTrips.indexOf('shape_id');
                
                const tripInfo = {};
                for (let i = 1; i < lignesTrips.length; i++) {
                    if (!lignesTrips[i]) continue;
                    const cols = lireCSV(lignesTrips[i]);
                    const headsign = cols[iHeadT] ? cols[iHeadT].replace(/"/g, '') : "Aller";
                    const shapeId = cols[iShapeT] ? cols[iShapeT].replace(/"/g, '') : "S";
                    // L'empreinte = Ligne + Destination + Forme physique de la route
                    tripInfo[cols[iTripT]] = cols[iRouteT] + "::" + headsign + "::" + shapeId;
                }

                // 2. Lire les arrêts
                const lignesStops = (await fStops.text()).split(/\r?\n/);
                const headStops = lireCSV(lignesStops[0]);
                const iStopId = headStops.indexOf('stop_id'), iStopName = headStops.indexOf('stop_name'), iStopLat = headStops.indexOf('stop_lat'), iStopLon = headStops.indexOf('stop_lon');

                const reseau = {};
                for (let i = 1; i < lignesStops.length; i++) {
                    if (!lignesStops[i]) continue;
                    const cols = lireCSV(lignesStops[i]);
                    if(cols.length > Math.max(iStopLat, iStopLon) && cols[iStopLat]) {
                        // On remplace le tableau par un objet (dictionnaire)
                        reseau[cols[iStopId]] = { n: cols[iStopName].replace(/"/g, ''), lat: parseFloat(cols[iStopLat]), lon: parseFloat(cols[iStopLon]), lignes: {} };
                    }
                }

                // 3. Lire l'ordre de passage (séquences)
                const lignesStopTimes = (await fStopTimes.text()).split(/\r?\n/);
                const headST = lireCSV(lignesStopTimes[0]);
                const iTripST = headST.indexOf('trip_id'), iStopST = headST.indexOf('stop_id'), iSeqST = headST.indexOf('stop_sequence');

                const tripStops = {};
                for (let i = 1; i < lignesStopTimes.length; i++) {
                    if (!lignesStopTimes[i]) continue;
                    const cols = lireCSV(lignesStopTimes[i]);
                    const tripId = cols[iTripST];
                    if (!tripId) continue;
                    if (!tripStops[tripId]) tripStops[tripId] = [];
                    tripStops[tripId].push({ s: cols[iStopST], seq: parseInt(cols[iSeqST]) });
                }

                // 4. On garde un seul "voyage type" (le plus long) par empreinte pour ne pas surcharger la RAM
                const bestTripForPattern = {};
                for (const [tripId, stops] of Object.entries(tripStops)) {
                    const patternId = tripInfo[tripId];
                    if (!patternId) continue;
                    if (!bestTripForPattern[patternId] || stops.length > tripStops[bestTripForPattern[patternId]].length) {
                        bestTripForPattern[patternId] = tripId;
                    }
                }

                // 5. On assigne la séquence aux arrêts
                for (const [patternId, tripId] of Object.entries(bestTripForPattern)) {
                    const stops = tripStops[tripId];
                    for (const stop of stops) {
                        if (reseau[stop.s]) {
                            reseau[stop.s].lignes[patternId] = stop.seq;
                        }
                    }
                }

                let codeFinal = "const reseauArrets = {\n";
                for (const [stopId, data] of Object.entries(reseau)) {
                    if (Object.keys(data.lignes).length === 0) continue;
                    codeFinal += `  "${stopId}": { n: "${data.n}", lat: ${data.lat}, lon: ${data.lon}, lignes: ${JSON.stringify(data.lignes)} },\n`;
                }
                codeFinal += "};\n";
                document.getElementById('resultat').value = codeFinal;
            } catch (e) { document.getElementById('resultat').value = "Erreur : " + e.message; }
        }
    </script>
</body>
</html>
